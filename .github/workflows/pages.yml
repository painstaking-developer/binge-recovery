# Deploy to GitHub Pages — PUBLIC repo edition.
#
# This file is generated by build-public.mjs and shipped inside out/ (alongside the
# build-previews.mjs it calls). The PRIVATE source repo assembles the static site
# into out/ and you drop out/ into this public repo. Everything here is already
# built — the only build step is regenerating the per-talk link-preview pages
# (e/<id>.html), which are NOT committed (there are tens of thousands of them) and
# so are produced fresh on the runner from the slim Recovery.json at the repo root.
#
# Enable it under Settings → Pages → Source: GitHub Actions.
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time; let an in-progress run finish rather than cancelling it.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # Regenerate the per-episode preview pages into ./e/ from the slim
      # Recovery.json at the repo root. No npm install — the script is plain Node.
      - name: Build episode preview pages
        env:
          PREVIEWS_SITE: .
          PREVIEWS_JSON: Recovery.json
        run: node .github/scripts/build-previews.mjs

      - uses: actions/upload-pages-artifact@v3
        with:
          path: .

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
